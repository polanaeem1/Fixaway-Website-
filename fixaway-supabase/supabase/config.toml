# A string used to distinguish different Supabase projects on the same host.
project_id = "fixaway"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false

[functions.auth]
verify_jwt = false

[functions.technicians]
verify_jwt = false

[functions.requests]
verify_jwt = false

[functions.quotations]
verify_jwt = false

[functions.orders]
verify_jwt = false

[functions.chat]
verify_jwt = false

[functions.wallet]
verify_jwt = false

[functions.admin]
verify_jwt = false

[functions.upload]
verify_jwt = false

[functions.notifications]
verify_jwt = false

[functions.reviews]
verify_jwt = false
